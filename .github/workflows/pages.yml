name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            sites/hub/package-lock.json
            sites/apihub/package-lock.json

      - name: Install and build hub
        working-directory: sites/hub
        run: |
          npm ci
          npm run build

      - name: Install and build apihub
        working-directory: sites/apihub
        run: |
          npm ci
          npm run build

      - name: Merge sites for Pages
        run: |
          mkdir -p _site
          cp -r sites/hub/dist/* _site/
          mkdir -p _site/apihub
          cp -r sites/apihub/dist/* _site/apihub/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
