server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use relative redirects so the browser keeps its original host:port.
    # Without this, nginx constructs absolute redirect URLs using its own port (80),
    # which strips any custom port the reverse proxy or Docker mapping may use.
    absolute_redirect off;

    # Charset
    charset utf-8;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Cache static assets aggressively
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache images
    location ~* \.(jpg|jpeg|png|gif|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Health check endpoint (for Docker HEALTHCHECK and load balancers)
    location /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Main SPA routing — serve index.html for all routes
    location / {
        try_files $uri $uri/ $uri.html /index.html;

        # Cache HTML pages briefly
        add_header Cache-Control "public, max-age=60";
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
